name: Deployment

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build Angular SSG
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Angular SSG production
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: angular-ssg-build
          path: dist/

  test:
    name: Run Angular Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: angular-ssg-build
          path: dist

      - name: Run unit tests
        run: npm test

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: angular-ssg-build
          path: dist

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        run: |
          docker build \
            --file Dockerfile \
            --tag registry.fabian-feichter.at/reparieren-statt-wegwerfen:latest .

      - name: Log in to private container registry
        uses: azure/docker-login@v2
        with:
          login-server: registry.fabian-feichter.at
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Push Docker image
        run: docker push registry.fabian-feichter.at/reparieren-statt-wegwerfen:latest

  deploy:
    name: Deploy Docker Image
    runs-on: ubuntu-latest
    needs: docker
    environment: Production
    steps:
      - name: Run deployment script on Droplet via SSH
        uses: garygrossgarten/github-action-ssh@0.8.0
        with:
          command: sh /cloud/scripts/reparieren-statt-wegwerfen-deploy.sh
          host: fabian-feichter.at
          username: root
          privateKey: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}
